name: Skeptic Review (disabled)

on:
  pull_request:
    paths:
      - 'engine/rules/**'
      - 'engine/state/**'
      - 'engine/cards/**'

jobs:
  skeptic-review:
    if: false  # Disabled to reduce API token cost. Remove this line to re-enable.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          model: claude-haiku-4-5-20251001
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are the Skeptic agent for the TCG Hyperbolic Time Chamber project.
            Read agents/skeptic.md for your full role definition, then review
            the changes in this PR.

            Your review should cover:
            1. Rules correctness — compare against ref/comprehensive-rules.md
            2. Talishar cross-reference — compare against ref/talishar-engine-analysis.md
            3. Test gap analysis — identify missing test coverage for edge cases

            Output a structured review with:
            - **Correct**: things the code gets right (brief)
            - **Issues**: rules violations or deviations with rule numbers and severity (critical/minor)
            - **Missing tests**: specific scenarios that should have test coverage
            - **Ambiguous**: rules that are unclear and need human judgment

            ## Verdict — MANDATORY

            After completing your review, you MUST use the Bash tool to execute
            one of the following shell commands. Do NOT just write the command —
            actually run it. This is required for the auto-merge workflow.

            If there are NO critical issues, run this exact command:
            gh pr review ${{ github.event.pull_request.number }} --approve --body "Skeptic: APPROVED"

            If there ARE critical issues, run this exact command:
            gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Skeptic: CHANGES REQUESTED"

            Minor issues and missing tests alone are NOT grounds to request changes —
            only critical issues (wrong game outcomes) should block a PR.
