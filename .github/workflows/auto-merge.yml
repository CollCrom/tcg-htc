name: Auto Merge

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # workflow_run doesn't directly give us the PR number, so look it up from the head branch
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR=$(gh pr list --repo "${{ github.repository }}" --head "$HEAD_BRANCH" --base main --json number --jq '.[0].number')
          echo "number=$PR" >> "$GITHUB_OUTPUT"

      - name: Squash merge PR
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
