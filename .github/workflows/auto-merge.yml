name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'main' || github.event.check_suite.pull_requests[0].base.ref == 'main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.check_suite.pull_requests[0].number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if PR is approved and tests pass
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.number }}
          if [ -z "$PR" ] || [ "$PR" = "0" ]; then
            echo "No PR found, skipping"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for an approving review
          APPROVED=$(gh pr view "$PR" --repo "${{ github.repository }}" --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | length')

          # Check if all status checks passed
          CHECKS_PASS=$(gh pr checks "$PR" --repo "${{ github.repository }}" 2>&1 || true)
          ALL_PASS=true
          if echo "$CHECKS_PASS" | grep -qE "fail|pending"; then
            ALL_PASS=false
          fi

          echo "approved=$APPROVED"
          echo "all_pass=$ALL_PASS"

          if [ "$APPROVED" -gt 0 ] && [ "$ALL_PASS" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash merge PR
        if: steps.check.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
